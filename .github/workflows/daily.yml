name: ETF Daily

# Runs every day at 23:00 UTC = 07:00 SGT (next morning).
# You can also trigger it manually from the Actions tab.
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write   # allows the job to commit the updated index.html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate today's digest
        run: python generate.py

      - name: Commit & push updated page
        run: |
          git config user.name  "etf-daily-bot"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Daily ETF digest: $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
