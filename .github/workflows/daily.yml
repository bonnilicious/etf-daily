name: ETF Daily

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate today's digest
        run: python generate.py

      - name: Commit & push updated page
        run: |
          git config user.name  "etf-daily-bot"
          git config user.email "actions@github.com"
          git add index.html data/
          git commit -m "Daily ETF digest" || echo "No changes"
          git push
